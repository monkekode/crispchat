name = "crisp-gemini-chat"
main = "src/index.js"
compatibility_date = "2024-04-03"

# Environment variables that are non-sensitive or have default values.
# IMPORTANT: Sensitive keys like GEMINI_API_KEY, CRISP_API_KEY, and ADMIN_PASSWORD
# should be added as secrets using `wrangler secret put <NAME>` or via Cloudflare Dashboard.
[vars]
ADMIN_USERNAME = "admin"

# KV Namespace binding. You can create a KV namespace by running:
# `npx wrangler kv:namespace create CRISP_CHAT_KV`
# And then replace the `id` value below with the output ID.
[[kv_namespaces]]
binding = "CRISP_CHAT_KV"
id = "PLACEHOLDER_KV_NAMESPACE_ID"
